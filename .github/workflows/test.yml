name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (ubuntu-latest, nix devShell)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          # gitleaks scans full history in the `ci` task.
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache /nix/store
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d
        with:
          use-flakehub: "disabled"
          use-gha-cache: "enabled"

      # Builds the devShell (pkf / apm / gitleaks / ast-grep), asserts the
      # toolchain is present, and runs the secret scan over full history.
      - name: CI gate
        run: nix develop --command pkf run ci

      # Verifies apm.yml / apm.lock.yaml still resolve on a clean machine —
      # the reproducibility promise of the template.
      - name: APM resolution
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command pkf run setup
